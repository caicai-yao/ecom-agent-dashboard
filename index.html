<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>市场洞察Agent v2</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useState, useRef, useEffect } = React;

      const C = {
        bg: "#F4F5F9", white: "#fff", blue: "#3B6BF5", blueDim: "#EBF0FF",
        dark: "#1A1D2E", muted: "#9098B1", border: "#E8EAF0",
        green: "#0EA47A", greenDim: "#E6F7F1",
        red: "#E5463D", redDim: "#FEECEB",
        yellow: "#F5A623", yellowDim: "#FEF6E4",
        purple: "#7C3AED", purpleDim: "#F0E6FF",
        orange: "#FF6B35",
      };

      function Tag({ text, color, bg }) {
        return <span style={{ fontSize: 11, fontWeight: 600, color: color || C.blue, background: bg || `${color || C.blue}18`, padding: "2px 8px", borderRadius: 4, marginRight: 4, whiteSpace: "nowrap", display: "inline-block" }}>{text}</span>;
      }

      function AgentBubble({ text, inline }) {
        return (
          <div style={{ display: "flex", alignItems: "flex-start", gap: 7, marginTop: inline ? 6 : 10 }}>
            <div style={{ width: 20, height: 20, borderRadius: "50%", background: C.blue, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, flexShrink: 0, marginTop: 1 }}>🤖</div>
            <div style={{ fontSize: 12, color: "#2549B5", background: C.blueDim, padding: "6px 10px", borderRadius: "4px 10px 10px 10px", lineHeight: 1.55, flex: 1 }}>{text}</div>
          </div>
        );
      }

      function AskBar({ placeholder }) {
        const [v, setV] = useState("");
        return (
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <input value={v} onChange={e => setV(e.target.value)} placeholder={placeholder || "追问 Agent..."} style={{ flex: 1, padding: "8px 12px", borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 12, outline: "none", background: "#fff" }} />
            <button style={{ padding: "8px 14px", borderRadius: 8, border: "none", background: C.blue, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>发送 →</button>
          </div>
        );
      }

      function Sidebar({ tab, setTab }) {
        const items = [
          { key: "merchant", icon: "🏪", label: "商家选品" },
          { key: "kol", icon: "🎬", label: "KOL选品" },
        ];
        return (
          <aside style={{ width: 200, background: C.white, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", flexShrink: 0 }}>
            <div style={{ padding: "18px 16px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: C.blue, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 14 }}>🛒</div>
              <span style={{ fontSize: 14, fontWeight: 700, color: C.dark }}>市场洞察Agent</span>
            </div>
            <nav style={{ padding: "10px 8px", flex: 1 }}>
              {items.map(it => (
                <div key={it.key} onClick={() => setTab(it.key)}
                  style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 10px", borderRadius: 8, marginBottom: 2, cursor: "pointer", fontSize: 13, fontWeight: tab === it.key ? 600 : 400, background: tab === it.key ? C.blueDim : "transparent", color: tab === it.key ? C.blue : "#5A6078" }}>
                  <span style={{ fontSize: 15 }}>{it.icon}</span>{it.label}
                </div>
              ))}
              <div style={{ padding: "12px 10px 4px", fontSize: 10, color: C.muted, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase" }}>历史记录</div>
              <div style={{ padding: "5px 10px", fontSize: 12, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "pointer" }}>🔥 美区 Kitchen 爆品</div>
              <div style={{ padding: "5px 10px", fontSize: 12, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "pointer" }}>📱 3C 配件 TikTok 趋势</div>
            </nav>
          </aside>
        );
      }

      function ChatPanel({ open, onClose, context }) {
        const [msgs, setMsgs] = useState([]);
        const [input, setInput] = useState("");
        const bottomRef = useRef(null);

        useEffect(() => {
          if (open && context && msgs.length === 0) {
            setMsgs([{ role: "agent", text: `好的，关于「${context}」你想进一步了解什么？可以问我热点趋势、竞品话术或受众分析。` }]);
          }
        }, [open, context]);

        useEffect(() => {
          bottomRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [msgs]);

        const send = () => {
          if (!input.trim()) return;
          const q = input.trim();
          setInput("");
          setMsgs(prev => [...prev, { role: "user", text: q }]);
          setTimeout(() => {
            setMsgs(prev => [...prev, { role: "agent", text: `关于“${q}”，根据最新数据：TikTok 上关于此话题的互动率（点赞/播放）达到了 12%，远超均值 5%。建议在脚本第3秒直接切入痛点。` }]);
          }, 800);
        };

        if (!open) return null;

        return (
          <div style={{ position: "fixed", top: 0, right: 0, bottom: 0, width: 380, background: C.white, boxShadow: "-4px 0 24px rgba(0,0,0,0.08)", display: "flex", flexDirection: "column", zIndex: 100, borderLeft: `1px solid ${C.border}` }}>
            <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", background: "#F8FAFC" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: C.blue, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🤖</div>
                <span style={{ fontSize: 15, fontWeight: 700, color: C.dark }}>Agent 追问</span>
              </div>
              <button onClick={onClose} style={{ background: "transparent", border: "none", fontSize: 20, color: C.muted, cursor: "pointer", padding: 4 }}>×</button>
            </div>
            
            <div style={{ flex: 1, overflow: "auto", padding: "20px", display: "flex", flexDirection: "column", gap: 16 }}>
              {msgs.map((m, i) => (
                <div key={i} style={{ display: "flex", flexDirection: m.role === "user" ? "row-reverse" : "row", gap: 10, alignItems: "flex-start" }}>
                  {m.role === "agent" && <div style={{ width: 24, height: 24, borderRadius: "50%", background: C.blue, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, flexShrink: 0 }}>🤖</div>}
                  <div style={{ background: m.role === "user" ? C.blue : "#F1F5F9", color: m.role === "user" ? "#fff" : C.dark, padding: "10px 14px", borderRadius: m.role === "user" ? "12px 2px 12px 12px" : "2px 12px 12px 12px", fontSize: 13, lineHeight: 1.5, maxWidth: "85%" }}>
                    {m.text}
                  </div>
                </div>
              ))}
              <div ref={bottomRef} />
            </div>

            <div style={{ padding: "16px", borderTop: `1px solid ${C.border}`, background: "#fff" }}>
              <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                {["这个热点的核心受众是谁？", "怎么把这个写进测评脚本？"].map((t, i) => (
                  <span key={i} onClick={() => setInput(t)} style={{ padding: "6px 12px", borderRadius: 100, background: "#F1F5F9", color: "#475569", fontSize: 12, cursor: "pointer" }}>{t}</span>
                ))}
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && send()} placeholder="输入追问内容..." style={{ flex: 1, padding: "10px 14px", borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 13, outline: "none" }} />
                <button onClick={send} style={{ width: 40, borderRadius: 8, border: "none", background: C.blue, color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
              </div>
            </div>
          </div>
        );
      }

      /* ─── MERCHANT VIEW ─── */
      function MerchantView({ onAsk }) {
        const [expanded, setExpanded] = useState(false);
        const [activeFilter, setActiveFilter] = useState("全部");
        const filters = ["全部", "蓝海机会", "Kitchen", "Beauty", "Pet", "美区", "英区"];

        const products = [
          { name: "Collapsible Silicone Dish Rack", img: "🧺", price: "$12.99", ttSales: "1,247/周", amzBSR: "#2,341", score: 92, tags: ["Kitchen", "US"], why: "社媒热度7天↑340%，TikTok Shop在售仅23家，Amazon BSR快速爬升，供需缺口明显。用户核心痛点：现有产品不够稳固。", creators: 45, videos: 128, sentiment: "87%正面" },
          { name: "Ice Cooling Powder Brush", img: "💄", price: "£8.99", ttSales: "876/周", amzBSR: "N/A", score: 88, tags: ["Beauty", "UK"], why: "英区TikTok话题爆发，7天播放量2300万，Amazon尚无同款，先发窗口期2-3周内。", creators: 23, videos: 67, sentiment: "91%正面" },
          { name: "Portable Garment Steamer Mini", img: "👔", price: "$24.99", ttSales: "2,100/周", amzBSR: "#891", score: 85, tags: ["Home", "US"], why: "TikTok+Amazon双平台热销，竞争中等偏高，差异化方向：快速加热+旅行便携。", creators: 89, videos: 234, sentiment: "78%正面" },
          { name: "Pet Grooming Glove 2.0", img: "🐾", price: "$9.99", ttSales: "3,400/周", amzBSR: "#456", score: 79, tags: ["Pet", "US"], why: "销量高但竞争激烈（156家），负面评论集中在“毛发粘手”，改进版有机会。", creators: 134, videos: 456, sentiment: "72%正面" },
        ];

        return (
          <div style={{ padding: "20px 28px", width: "100%", boxSizing: "border-box" }}>

            {/* ── AGENT 结论卡：最高优先级，放最顶 ── */}
            <div style={{ background: "linear-gradient(135deg, #EBF0FF 0%, #E6F7F1 100%)", borderRadius: 14, padding: "18px 20px", marginBottom: 20, border: "1px solid rgba(59,107,245,0.12)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                <div style={{ width: 24, height: 24, borderRadius: "50%", background: C.blue, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>🤖</div>
                <span style={{ fontSize: 14, fontWeight: 700, color: "#2549B5" }}>今日 Agent 洞察</span>
                <span style={{ fontSize: 11, color: C.blue, background: "#fff", padding: "1px 8px", borderRadius: 10, fontWeight: 600, marginLeft: 4 }}>03-19 08:00 更新</span>
              </div>

              {/* 核心结论 — 让用户一句话就能得到决策 */}
              <p style={{ fontSize: 14, lineHeight: 1.75, margin: "0 0 14px", color: C.dark, fontWeight: 500 }}>
                今天发现 <strong style={{ color: C.blue }}>3 个值得跟进的机会</strong>，其中 2 个需要在本周内决策——
              </p>

              {/* 3个结论以"操作建议"为主，数据为辅 */}
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
                {[
                  { icon: "🚨", urgency: "本周内", color: C.red, bg: C.redDim, borderColor: "rgba(229,70,61,0.18)", title: "可折叠沥水篮：立即入场", reason: "社媒热度7天↑340%但在售商家仅23家，供需缺口处于临界点。超过2周窗口期可能消失。" },
                  { icon: "⚡", urgency: "3天内", color: C.orange, bg: "#FFF0E8", borderColor: "rgba(255,107,53,0.18)", title: "冰感散粉刷：监控转行动", reason: "Amazon尚无同款，TikTok播放量已到2300万。先发优势窗口约2-3周。" },
                  { icon: "👀", urgency: "持续观察", color: C.muted, bg: "#F4F5F9", borderColor: C.border, title: "竞品 SunHome 全线降价 15%", reason: "可能是清库存信号。30天销量已下滑，建议观望而非跟价。" },
                ].map((item, i) => (
                  <div key={i} style={{ background: item.bg, border: `1px solid ${item.borderColor}`, borderRadius: 10, padding: "10px 14px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 14 }}>{item.icon}</span>
                      <span style={{ fontSize: 12, fontWeight: 700, color: item.color }}>{item.urgency}</span>
                      <span style={{ fontSize: 13, fontWeight: 600, color: C.dark }}>{item.title}</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#5A6078", lineHeight: 1.5, paddingLeft: 22 }}>{item.reason}</div>
                  </div>
                ))}
              </div>

              {/* 追问 */}
              <div style={{ position: "relative" }}>
                <input onFocus={() => onAsk("可折叠沥水篮")} placeholder="追问：可折叠沥水篮的供应商在哪里找？利润空间有多大？" style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
                <div style={{ position: "absolute", right: 10, top: 8, color: C.muted }}>⏎</div>
              </div>
            </div>

            {/* ── 供需缺口：保留，但收紧 ── */}
            <div style={{ background: C.white, borderRadius: 12, padding: "14px 18px", marginBottom: 16, border: `1px solid ${C.border}` }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 15 }}>🔥</span>
                  <span style={{ fontSize: 14, fontWeight: 700 }}>供需缺口雷达</span>
                  <span style={{ fontSize: 11, color: C.muted, background: "#F0F1F5", padding: "2px 7px", borderRadius: 8 }}>社媒热度 × 电商供给</span>
                </div>
                <span style={{ fontSize: 11, color: C.muted }}>实时监测中</span>
              </div>
              {[
                { kw: "collapsible dish rack", social: 340, sellers: 23, gap: "极高", gapColor: C.red, platform: "US Kitchen", trend: "↑↑↑" },
                { kw: "ice cooling powder brush", social: 210, sellers: 8, gap: "极高", gapColor: C.red, platform: "UK Beauty", trend: "↑↑" },
                { kw: "pet grooming glove 2.0", social: 180, sellers: 156, gap: "中等", gapColor: C.yellow, platform: "US Pet", trend: "↑" },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: i < 2 ? `1px solid ${C.border}` : "none" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: C.dark, marginBottom: 3 }}>{item.kw}</div>
                    <div style={{ display: "flex", gap: 4 }}>
                      <Tag text={item.platform} color={C.blue} />
                      <Tag text={`社媒${item.trend}`} color={C.green} />
                    </div>
                  </div>
                  <div style={{ textAlign: "center", width: 72 }}><div style={{ fontSize: 10, color: C.muted, marginBottom: 2 }}>社媒热度</div><div style={{ fontSize: 15, fontWeight: 800, color: C.green }}>+{item.social}%</div></div>
                  <div style={{ textAlign: "center", width: 72 }}><div style={{ fontSize: 10, color: C.muted, marginBottom: 2 }}>在售商家</div><div style={{ fontSize: 15, fontWeight: 800, color: C.dark }}>{item.sellers}</div></div>
                  <div style={{ textAlign: "center", width: 52 }}><div style={{ fontSize: 10, color: C.muted, marginBottom: 2 }}>缺口</div><div style={{ fontSize: 12, fontWeight: 700, color: item.gapColor }}>{item.gap}</div></div>
                </div>
              ))}
            </div>

            {/* ── 商品机会列表 ── */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 15 }}>📦</span>
                <span style={{ fontSize: 14, fontWeight: 700 }}>商品机会</span>
                <span style={{ fontSize: 11, color: C.muted, background: "#F0F1F5", padding: "2px 7px", borderRadius: 8 }}>23</span>
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <input placeholder="搜索..." style={{ padding: "5px 10px", borderRadius: 6, border: `1px solid ${C.border}`, fontSize: 12, width: 140, outline: "none" }} />
                <button style={{ padding: "5px 10px", borderRadius: 6, border: `1px solid ${C.border}`, background: "#fff", fontSize: 12, cursor: "pointer" }}>筛选</button>
              </div>
            </div>
            <div style={{ display: "flex", gap: 5, marginBottom: 12, flexWrap: "wrap" }}>
              {filters.map((f, i) => (
                <span key={i} onClick={() => setActiveFilter(f)} style={{ padding: "4px 11px", fontSize: 11, borderRadius: 6, border: f === activeFilter ? "none" : `1px solid ${C.border}`, background: f === activeFilter ? C.blue : "transparent", color: f === activeFilter ? "#fff" : "#5A6078", fontWeight: f === activeFilter ? 600 : 400, cursor: "pointer" }}>{f}</span>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(400px, 1fr))", gap: 10, marginBottom: 20 }}>
              {products.map((p, i) => (
                <div key={i} style={{ background: C.white, borderRadius: 10, padding: "14px 16px", border: `1px solid ${C.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      <div style={{ width: 38, height: 38, borderRadius: 8, background: "#F0F1F5", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 19 }}>{p.img}</div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: C.dark, marginBottom: 2 }}>{p.name}</div>
                        <div style={{ display: "flex", gap: 3 }}>{p.tags.map((t, j) => <Tag key={j} text={t} color={C.blue} />)}</div>
                      </div>
                    </div>
                    <div style={{ background: p.score >= 90 ? C.green : p.score >= 80 ? C.blue : C.yellow, color: "#fff", borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{p.score}分</div>
                  </div>
                  <div style={{ display: "flex", gap: 12, marginBottom: 6, fontSize: 12 }}>
                    <span><span style={{ color: C.muted }}>价格 </span><strong>{p.price}</strong></span>
                    <span><span style={{ color: C.muted }}>TT周销 </span><strong style={{ color: C.green }}>{p.ttSales}</strong></span>
                    <span><span style={{ color: C.muted }}>AMZ BSR </span><strong>{p.amzBSR}</strong></span>
                  </div>
                  <div style={{ display: "flex", gap: 10, marginBottom: 8, fontSize: 11, color: C.muted }}>
                    <span>👤 {p.creators}位达人</span><span>📹 {p.videos}条视频</span><span>💬 {p.sentiment}</span>
                  </div>
                  {/* Agent 推荐理由：突出，但简洁 */}
                  <div style={{ fontSize: 11, color: "#2549B5", background: C.blueDim, padding: "6px 10px", borderRadius: 6, lineHeight: 1.5, marginBottom: 8, cursor: "pointer" }} onClick={() => onAsk(p.name)}>
                    🤖 {p.why}
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button style={{ flex: 1, padding: "5px", borderRadius: 6, border: `1px solid ${C.border}`, background: "transparent", fontSize: 11, color: "#5A6078", cursor: "pointer" }}>详情</button>
                    <button style={{ flex: 1, padding: "5px", borderRadius: 6, border: `1px solid ${C.border}`, background: "transparent", fontSize: 11, color: "#5A6078", cursor: "pointer" }}>生成脚本</button>
                    <button style={{ flex: 1, padding: "5px", borderRadius: 6, border: "none", background: C.blue, fontSize: 11, color: "#fff", fontWeight: 600, cursor: "pointer" }}>加入选品池 ⭐</button>
                  </div>
                </div>
              ))}
            </div>

            {/* ── 竞品动态：收紧为信息流 ── */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 15 }}>🕵️</span>
              <span style={{ fontSize: 14, fontWeight: 700 }}>竞品监控</span>
              <span style={{ fontSize: 11, color: C.muted, background: "#F0F1F5", padding: "2px 7px", borderRadius: 8 }}>17 条动态</span>
            </div>
            {[
              { event: "SunHome 全线Kitchen产品降价15%", time: "2h前", type: "调价", typeColor: C.red, ai: "可能为清库存，建议观望。30天销量已下滑，降价或为止损信号。" },
              { event: "CleanPro 新上架3款可折叠厨房工具", time: "5h前", type: "新品", typeColor: C.green, ai: "卖点与你的选品方向重叠，建议关注其首周销量。" },
              { event: "BeautyGlow 与@MakeupByMia 达成合作", time: "1天前", type: "达人", typeColor: C.purple, ai: "@MakeupByMia 英区890K粉，48h内可能发布带货视频，预计推动品类热度。" },
            ].map((e, i) => (
              <div key={i} style={{ background: C.white, borderRadius: 8, padding: "10px 14px", border: `1px solid ${C.border}`, marginBottom: 7, display: "flex", alignItems: "flex-start", gap: 10 }}>
